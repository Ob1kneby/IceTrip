<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Iceland 2026 — Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
header{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:14px 20px;position:sticky;top:0;z-index:10}
header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{font-size:11px;color:#666;margin-top:2px}
.wrap{max-width:720px;margin:0 auto;padding:20px 20px 80px}
.master{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;margin-bottom:16px}
.master-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.master-top span:first-child{font-size:13px;font-weight:600}
.master-pct{font-size:22px;font-weight:700;color:#22c55e}
.master-bar-wrap{height:5px;background:#2a2a2a;border-radius:3px;overflow:hidden}
.master-bar{height:100%;background:#22c55e;border-radius:3px;transition:width .3s}
.master-sub{font-size:11px;color:#666;margin-top:5px}
.section{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.sec-head{padding:11px 16px;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px}
.sec-title{font-size:13px;font-weight:600;flex:1}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.b-urgent{background:#7f1d1d;color:#fca5a5}
.b-soon{background:#3a2200;color:#fbbf24}
.b-before{background:#1e3a5f;color:#93c5fd}
.b-gear{background:#1e1b4b;color:#a5b4fc}
.b-info{background:#0c2c0c;color:#86efac}
.items{padding:4px 14px}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #1e1e1e;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.item:last-child{border-bottom:none}
.item.done .label{text-decoration:line-through;opacity:.5}
.item.done .sub{opacity:.5}
.cb{width:17px;height:17px;border-radius:4px;border:1.5px solid #444;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:10px;font-weight:700;color:#fff}
.item.done .cb{background:#22c55e;border-color:#22c55e}
.info{flex:1;min-width:0}
.label{font-size:12px;font-weight:500;color:#eee;line-height:1.4}
.sub{font-size:11px;color:#666;margin-top:2px;line-height:1.4}
.link{font-size:10px;color:#4a9eff;display:inline-block;margin-top:2px}
.sec-prog{padding:7px 14px 10px;border-top:1px solid #1e1e1e}
.prog-top{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-bottom:4px}
.prog-wrap{height:2px;background:#222;border-radius:1px;overflow:hidden}
.prog-bar{height:100%;background:#22c55e;border-radius:1px;transition:width .3s}
</style>
</head>
<body>
<header>
  <h1>🇮🇸 Iceland Ring Road 2026</h1>
  <p>Pre-Departure Checklist · Jun 30 – Jul 14 · checks save in your browser</p>
</header>
<div class="wrap">
  <div class="master">
    <div class="master-top"><span>Overall progress</span><span class="master-pct" id="mpct">0%</span></div>
    <div class="master-bar-wrap"><div class="master-bar" id="mbar" style="width:0"></div></div>
    <div class="master-sub" id="msub">0 of 0 complete</div>
  </div>
  <div id="root"></div>
</div>
<script>
const SECTIONS = [
  {title:"Book immediately — do today", badge:"urgent", items:[
    {t:"Glacier Xtreme ice climbing — Falljökull / Vatnajökull", s:"Day 7 (Jul 6 · Monday) · ~$242pp · Max 6 people · July sells out within days", u:"https://adventures.is/iceland/day-tours/glacier-tours/glacier-tours-on-vatnajokull/glacier-xtreme-and-ice-climbing/"},
    {t:"Canyoning under Vatnajökull — Ice Guardians", s:"Day 8 (Jul 7 · Tuesday) · ~$278pp · Only canyoning operator in Iceland", u:"https://ice-guardians.com/tour/half-day-canyoning-under-vatnajokull/"},
    {t:"Loft HI Hostel, Reykjavík — Bankastræti 7", s:"Night 1 (Jun 30)", u:"https://www.hostel.is"},
    {t:"Midgard Base Camp, Hvolsvöllur", s:"Night 2 (Jul 1)", u:"https://www.midgardbasecamp.is"},
    {t:"Vík HI Hostel", s:"Night 5 (Jul 4) · fills very fast in July", u:"https://www.hostel.is"},
    {t:"Höfn HI Hostel", s:"Night 8 (Jul 7)", u:"https://www.hostel.is"},
    {t:"Þakgil canyon campsite", s:"Night 4 (Jul 3) · thakgil.is or +354 893 4889", u:"https://www.thakgil.is"},
    {t:"Sterna highland bus — Þórsmörk return", s:"Day 4 (Jul 3 · Friday) · $44pp · non-optional access", u:"https://www.sterna.is"},
  ]},
  {title:"Book within 1–2 weeks", badge:"soon", items:[
    {t:"East Guesthouse, Egilsstaðir", s:"Night 10 (Jul 9 · Thursday)", u:"https://www.eastguesthouse.is"},
    {t:"Akureyri Guesthouse", s:"Night 13 (Jul 12 · Sunday) · search Booking.com"},
    {t:"The Freezer Hostel, Rif, Snæfellsnes", s:"Night 14 (Jul 13 · Monday)", u:"https://www.thefreezerhostel.com"},
    {t:"Forest Lagoon, Akureyri — evening slot", s:"Day 13 (Jul 12) evening · ~$44–52pp", u:"https://www.forestlagoon.is"},
    {t:"Drangey Island boat tour — Sauðárkrókur marina", s:"Day 14 (Jul 13 · Monday) · ~$80pp · confirm departure time with operator first", u:"https://www.drangey.net"},
    {t:"Landmannalaugar parking reservation", s:"Day 3 (Jul 2 · Thursday) · required if arriving 9am–4pm", u:"https://www.fi.is/en/mountain-huts/all-mountain-huts/landmannalaugar"},
  ]},
  {title:"Accommodation — all 15 nights", badge:"info", items:[
    {t:"Night 1 (Jun 30 · Tue) — Loft HI Hostel, Bankastræti 7, Reykjavík", s:"+354 553 8140 · hostel.is · check-in 2pm"},
    {t:"Night 2 (Jul 1 · Wed) — Midgard Base Camp, Hvolsvöllur", s:"midgardbasecamp.is · +354 578 3370"},
    {t:"Night 3 (Jul 2 · Thu) — Landmannalaugar campsite", s:"+354 860 3335 · fi.is · NOT on Camping Card · ~$25pp · pay at hut"},
    {t:"Night 4 (Jul 3 · Fri) — Þakgil canyon campsite", s:"+354 893 4889 · thakgil.is · cave dining room · hot showers"},
    {t:"Night 5 (Jul 4 · Sat) — Vík HI Hostel", s:"hostel.is · fills fast · kitchen available"},
    {t:"Night 6 (Jul 5 · Sun) — Blágil hut campsite (F207 loop)", s:"+354 487 4840 · NOT on Camping Card · ~$15pp"},
    {t:"Night 7 (Jul 6 · Mon) — Skaftafell NP campsite", s:"Camping Card accepted · hot showers + laundry"},
    {t:"Night 8 (Jul 7 · Tue) — Höfn HI Hostel", s:"+354 478 1736 · hostel.is · glacier terrace views"},
    {t:"Night 9 (Jul 8 · Wed) — Stafafell Nature Park", s:"+354 699 6684 · call to confirm open · ~$14pp"},
    {t:"Night 10 (Jul 9 · Thu) — East Guesthouse, Egilsstaðir", s:"+354 857 0804 · eastguesthouse.is"},
    {t:"Night 11 (Jul 10 · Fri) — Hlíð campsite, Lake Mývatn", s:"+354 899 6203 · Camping Card · HEAD NETS ESSENTIAL"},
    {t:"Night 12 (Jul 11 · Sat) — Dreki hut campsite (F88/F910 junction)", s:"ffa.is · NOT on Camping Card · ~$18pp · rangers on site"},
    {t:"Night 13 (Jul 12 · Sun) — Akureyri Guesthouse", s:"Book via Booking.com · quieter than Backpackers"},
    {t:"Night 14 (Jul 13 · Mon) — The Freezer Hostel, Rif", s:"+354 833 8200 · thefreezerhostel.com"},
  ]},
  {title:"Call / confirm before departure", badge:"before", items:[
    {t:"Rental company: F-road insurance in writing — F88, F206, F207", s:"Full-size spare tyre (not space-saver). RTT height clears campsite barriers."},
    {t:"Stafafell campsite open Jul 8 (Wed) — +354 699 6684"},
    {t:"Blágil hut campsite available Jul 5 (Sun) — +354 487 4840"},
    {t:"Travel insurance: glacier climbing + canyoning explicitly covered", s:"Call insurer, get written confirmation before departure."},
    {t:"Drangey Tours: confirm departure time given drive from Akureyri", s:"drangey.net · standard 9:30am departure may need a private afternoon slot — arrange in advance."},
    {t:"Ice Guardians: confirm exact start time + meetpoint", s:"+354 898 2277 · info@ice-guardians.com · Haukafell Campsite, Hornafjörður"},
  ]},
  {title:"Purchase before departure", badge:"before", items:[
    {t:"Iceland Camping Card — 2 adults, 28 nights", s:"€179 / ~$187", u:"https://www.campingcard.is"},
    {t:"Head nets × 2 (sealed face type)", s:"ESSENTIAL for Mývatn Day 11. Buy at REI or Amazon — cheaper than Iceland."},
    {t:"Water filter — Sawyer Squeeze or BeFree", s:"For Lónsöræfi canyon (Day 9) and Askja highland (Day 12)."},
    {t:"Blackout sleep mask × 2", s:"Midnight sun never gets dark in July. Essential from Night 1."},
    {t:"20-litre fuel jerry can (HDPE approved)", s:"Fill at Mývatn before F88 on Day 12. Mandatory — zero fuel on route."},
    {t:"Tow rope — rated to vehicle weight + 50%", s:"Minimum 5-tonne. Buy before leaving — expensive in Iceland."},
    {t:"Tyre plug kit + portable 12V inflator", s:"For F-road lava punctures."},
    {t:"First aid kit (adventure-rated)", s:"Compeed blisters, bandages, antiseptic, pain relief, antihistamine."},
    {t:"Waterproof phone case / dry bag for canyoning", s:"Required for Ice Guardians day."},
    {t:"Trekking poles × 2 pairs", s:"Essential for Viti crater (slippery descent), Bláhnúkur, Drangey cliff path, Lónsöræfi."},
  ]},
  {title:"Download + bookmark", badge:"before", items:[
    {t:"Parka.is — set up account + payment method before landing", s:"Camera-enforced parking at ALL major Iceland sites. Set up before you fly.", u:"https://parka.is"},
    {t:"112 Iceland app", s:"One button sends your GPS to Search & Rescue. Mandatory for F-road days.", u:"https://www.112.is"},
    {t:"Gaia GPS — download Iceland offline maps", s:"Essential for Lónsöræfi (Day 9) and Remundargil (Day 5). Download at home over wifi."},
    {t:"Wikiloc — save Remundargil + Lónsöræfi Hvítserkur routes offline"},
    {t:"Bookmark umferdin.is/en/road/91381 — F207 Laki live status", s:"Check morning of Day 6 (Jul 5 · Sunday).", u:"https://umferdin.is/en/road/91381"},
    {t:"Bookmark safetravel.is", s:"Register F88 (Day 12) and F206 (Day 6) routes before entering.", u:"https://safetravel.is"},
    {t:"Bookmark umferdin.is/en — general F-road conditions", u:"https://umferdin.is/en"},
    {t:"Bookmark en.vedur.is — Iceland 48hr weather forecast", u:"https://en.vedur.is"},
    {t:"Google Maps — download Iceland offline map pack"},
  ]},
  {title:"Clothing + gear", badge:"gear", items:[
    {t:"Waterproof jacket (taped seams) × each", s:"Keep in truck cab at ALL times — not the truck bed."},
    {t:"Waterproof trousers × each"},
    {t:"Merino wool base layer top × 3 each"},
    {t:"Merino wool base layer bottom × 2 each"},
    {t:"Warm mid-layer (fleece or down puffy) × each", s:"Askja/Dreki highlands near freezing even in July."},
    {t:"Warm hat + gloves × each"},
    {t:"Hiking boots (stiff, ankle support, waterproof) × each", s:"Break in 2+ weeks before departure."},
    {t:"Camp sandals × each"},
    {t:"Dry bags (5L, 10L, 20L) for truck bed", s:"Everything in the truck bed must be waterproofed."},
    {t:"Camp stove + fuel canisters", s:"Buy gas in Iceland — cannot fly with pressurised canisters."},
    {t:"Cooking pot, pan, utensils, plates, mugs"},
    {t:"Power banks × 2 (20,000mAh+)", s:"No power at Dreki or any F-road camp."},
    {t:"Sunscreen SPF 50+ × 2 tubes", s:"Midnight sun UV is real — especially on glaciers and lagoons."},
    {t:"Polarised sunglasses × each", s:"Essential on the glacier — cuts ice and water glare."},
    {t:"Reusable water bottles × 2 each (1L minimum)"},
    {t:"Quick-dry travel towel × each", s:"For canyoning, Viti swim, Forest Lagoon, campsite showers."},
    {t:"Personal medications + surplus"},
    {t:"Small padlock for hostel lockers"},
  ]},
  {title:"Vehicle check (on collection at KEF)", badge:"gear", items:[
    {t:"Full-size spare tyre confirmed — not a space-saver", s:"Insist on this before leaving the rental lot."},
    {t:"Tyre pressure checked on collection"},
    {t:"F-road insurance confirmed in writing — F88, F206, F207"},
    {t:"Duct tape (large roll) in truck"},
    {t:"Windscreen washer fluid level checked"},
    {t:"Jump cables or compact battery jump starter"},
    {t:"Emergency bivvy bag × 2"},
    {t:"Head torch × 2 + spare batteries"},
    {t:"RTT opens and closes correctly — test before leaving lot"},
    {t:"All existing vehicle damage noted on collection form"},
  ]},
  {title:"Day-of reminders", badge:"urgent", items:[
    {t:"Day 4 (Jul 3 · Fri): Skógar river trail HARD STOP at 10:15am", s:"Set a phone alarm the moment you start hiking. Missing the Sterna bus means no Þórsmörk."},
    {t:"Day 6 (Jul 5 · Sun): check umferdin.is/en/road/91381 for F206/F207 status", s:"If CLOSED → drive direct to Skaftafell. Day 7 Glacier Xtreme is completely unaffected."},
    {t:"Day 8 (Jul 7 · Tue): bring towel + full dry change of clothes for canyoning", s:"Leave in truck. Ice Guardians provides wetsuit, helmet, harness, neoprene boots."},
    {t:"Day 12 (Jul 11 · Sat): fill fuel MAX + 20L jerry can at Mývatn before F88", s:"Non-negotiable. Zero fuel on F88. Fill before leaving Mývatn."},
    {t:"Day 12 (Jul 11 · Sat): register F88 route at safetravel.is before entering"},
    {t:"Day 15 (Jul 14 · Tue): leave Snæfellsnes glacier tip by 11:15am", s:"Hard deadline. 4pm KEF departure. No margin."},
    {t:"Day 15 (Jul 14 · Tue): fill fuel at Orkan before rental return", s:"Most contracts require a full tank. Fill before the airport, not at airport prices."},
    {t:"Every F-road day: walk every river crossing before driving through"},
  ]},
  {title:"Emergency contacts", badge:"info", items:[
    {t:"Icelandic emergency — 112", s:"112 Iceland app sends your GPS automatically. Download before departure."},
    {t:"Road conditions + SAR info — 1777 (24hrs)"},
    {t:"Your rental company emergency number", s:"Save in phone AND write on paper in your wallet."},
    {t:"Ice Guardians (canyoning Day 8) — +354 898 2277", s:"info@ice-guardians.com · Haukafell Campsite, Hornafjörður"},
    {t:"Arctic Adventures (Glacier Xtreme Day 7) — adventures.is"},
    {t:"Drangey Tours (boat tour Day 14) — drangey.net"},
    {t:"Forest Lagoon (Day 13) — forestlagoon.is"},
    {t:"Travel insurance 24hr helpline", s:"Save number in phone AND write on paper."},
    {t:"KEF Airport — +354 425 6000"},
  ]},
];

const BADGE = {urgent:"b-urgent",soon:"b-soon",before:"b-before",gear:"b-gear",info:"b-info"};
const BADGE_LABEL = {urgent:"🔴 Do today",soon:"🟡 1–2 weeks",before:"🔵 Before departure",gear:"🟣 Gear",info:"📋 Reference"};

let state = {};
try { const s = localStorage.getItem('iceland-cl-v2'); if (s) state = JSON.parse(s); } catch(e){}

function save() { try { localStorage.setItem('iceland-cl-v2', JSON.stringify(state)); } catch(e){} }

function updateMaster() {
  let total = 0, done = 0;
  SECTIONS.forEach((sec,si) => sec.items.forEach((_,ii) => { total++; if(state[si+'-'+ii]) done++; }));
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('mpct').textContent = pct + '%';
  document.getElementById('mbar').style.width = pct + '%';
  document.getElementById('msub').textContent = done + ' of ' + total + ' complete';
}

function updateSection(si) {
  const sec = SECTIONS[si];
  const total = sec.items.length;
  const done = sec.items.filter((_,ii) => state[si+'-'+ii]).length;
  const pct = Math.round((done/total)*100);
  const bar = document.getElementById('pb-'+si); if(bar) bar.style.width = pct+'%';
  const lbl = document.getElementById('pl-'+si); if(lbl) lbl.textContent = done+'/'+total;
  const pctEl = document.getElementById('pp-'+si); if(pctEl) pctEl.textContent = pct+'%';
}

function toggle(si, ii) {
  const key = si+'-'+ii;
  state[key] = !state[key];
  save();
  const el = document.getElementById('item-'+key);
  if (el) {
    el.classList.toggle('done', state[key]);
    el.querySelector('.cb').textContent = state[key] ? '✓' : '';
  }
  updateSection(si);
  updateMaster();
}

function render() {
  const root = document.getElementById('root');
  SECTIONS.forEach((sec, si) => {
    const total = sec.items.length;
    const done = sec.items.filter((_,ii) => state[si+'-'+ii]).length;
    const pct = Math.round((done/total)*100);

    const div = document.createElement('div');
    div.className = 'section';

    let html = `<div class="sec-head"><span class="sec-title">${sec.title}</span><span class="badge ${BADGE[sec.badge]}">${BADGE_LABEL[sec.badge]}</span></div><div class="items">`;

    sec.items.forEach((item, ii) => {
      const key = si+'-'+ii;
      const isDone = state[key] || false;
      const link = item.u ? `<a class="link" href="${item.u}" target="_blank" onclick="event.stopPropagation()">${new URL(item.u).hostname} ↗</a>` : '';
      html += `<div class="item${isDone?' done':''}" id="item-${key}" onclick="toggle(${si},${ii})">
        <div class="cb">${isDone?'✓':''}</div>
        <div class="info">
          <div class="label">${item.t}</div>
          ${item.s ? `<div class="sub">${item.s}</div>` : ''}
          ${link}
        </div>
      </div>`;
    });

    html += `</div><div class="sec-prog">
      <div class="prog-top"><span id="pl-${si}">${done}/${total}</span><span id="pp-${si}">${pct}%</span></div>
      <div class="prog-wrap"><div class="prog-bar" id="pb-${si}" style="width:${pct}%"></div></div>
    </div>`;

    div.innerHTML = html;
    root.appendChild(div);
  });
  updateMaster();
}

render();
</script>
</body>
</html>
