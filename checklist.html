<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iceland 2026 — Pre-Departure Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;padding:0 0 80px}
a{color:#60a5fa}a:hover{text-decoration:underline}
header{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:16px 20px;position:sticky;top:0;z-index:100}
h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.sub{font-size:12px;color:#666}
.content{max-width:720px;margin:0 auto;padding:20px}
/* Master progress */
.master{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:16px 18px;margin-bottom:20px}
.master-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.master-title{font-size:14px;font-weight:600}
.master-pct{font-size:22px;font-weight:700;color:#22c55e}
.master-bar-wrap{height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden}
.master-bar{height:100%;background:#22c55e;border-radius:3px;transition:width .4s}
.master-sub{font-size:11px;color:#666;margin-top:6px}
/* Sections */
.section{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.sec-head{padding:12px 16px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:8px}
.sec-title{font-size:13px;font-weight:600;flex:1}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.b-urgent{background:#7f1d1d;color:#fca5a5}
.b-soon{background:#3a2200;color:#fbbf24}
.b-before{background:#1e3a5f;color:#93c5fd}
.b-gear{background:#1e1b4b;color:#a5b4fc}
.b-info{background:#0c2c0c;color:#86efac}
.items{padding:4px 14px}
.item{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 0;border-bottom:1px solid #222;
  cursor:pointer;transition:opacity .15s;user-select:none;
}
.item:last-child{border-bottom:none}
.item.done{opacity:.35}
.item.done .item-text{text-decoration:line-through}
.checkbox{
  width:18px;height:18px;border-radius:4px;
  border:1.5px solid #444;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.item.done .checkbox{background:#22c55e;border-color:#22c55e}
.item.done .checkbox::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.item-info{flex:1;min-width:0}
.item-text{font-size:12px;font-weight:500;color:#eee;line-height:1.4}
.item-sub{font-size:11px;color:#666;margin-top:2px;line-height:1.4}
.item-link{font-size:10px;color:#60a5fa;display:inline-block;margin-top:2px}
/* Section progress */
.sec-prog{padding:7px 14px 10px;border-top:1px solid #222}
.sec-prog-top{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-bottom:4px}
.prog-wrap{height:2px;background:#2a2a2a;border-radius:1px;overflow:hidden}
.prog-bar{height:100%;background:#22c55e;border-radius:1px;transition:width .3s}
</style>
</head>
<body>
<header>
  <h1>Iceland Ring Road 2026</h1>
  <div class="sub">Pre-Departure Checklist · Jun 30 – Jul 14 · checks saved in your browser</div>
</header>
<div class="content">
  <div class="master">
    <div class="master-top"><div class="master-title">Overall progress</div><div class="master-pct" id="mpct">0%</div></div>
    <div class="master-bar-wrap"><div class="master-bar" id="mbar" style="width:0%"></div></div>
    <div class="master-sub" id="msub">0 of 0 items complete</div>
  </div>
  <div id="root"></div>
</div>
<script>
const DATA = [
  {section:"Book immediately — do today", badge:"urgent", items:[
    {text:"Glacier Xtreme ice climbing — Falljökull / Vatnajökull", sub:"Day 6 (Jul 5) · ~$242pp · Max 6 people · July slots sell out within days of opening", url:"https://adventures.is/iceland/day-tours/glacier-tours/glacier-tours-on-vatnajokull/glacier-xtreme-and-ice-climbing/"},
    {text:"Canyoning under Vatnajökull — Ice Guardians", sub:"Day 7 (Jul 6) · ~$278pp (34,900 ISK) · Only canyoning operator in Iceland", url:"https://ice-guardians.com/tour/half-day-canyoning-under-vatnajokull/"},
    {text:"Katla ice cave super-jeep tour — from Vík", sub:"Day 4 (Jul 3) · ~$90pp · troll.is or katlatrack.is", url:"https://www.troll.is"},

  {section:"Accommodation — all 15 nights", badge:"info", items:[

    {text:"Travel insurance: glacier climbing + canyoning covered", sub:"Call your insurer and get written confirmation. Many standard policies exclude these activities."},

  ]},
  {section:"Purchase before departure", badge:"before", items:[
    {text:"Iceland Camping Card — 2 adults, 28 nights", sub:"€179 / ~$187 · campingcard.is", url:"https://www.campingcard.is"},
    {text:"Head nets × 2 (sealed face type)", sub:"ABSOLUTELY ESSENTIAL for Mývatn. Buy at REI or Amazon before you leave."},
    {text:"Water filter — Sawyer Squeeze or BeFree", sub:"For Lónsöræfi canyon (Day 8) and Askja highland hike (Day 11)"},
    {text:"Blackout sleep mask × 2", sub:"It genuinely never gets dark in July. Essential from Night 1."},
    {text:"20-litre fuel jerry can (HDPE approved)", sub:"Fill at Mývatn on Day 11 morning before F88. Mandatory."},

    {text:"First aid kit (adventure-rated)", sub:"Include Compeed blisters, bandages, antiseptic, pain relief, antihistamine."},

    {text:"Trekking poles × 2 pairs (collapsible)", sub:"Essential for Viti crater descent, Bláhnúkur, and Lónsöræfi."},
  ]},
  {section:"Download + bookmark", badge:"before", items:[
    {text:"Parka.is — set up account + payment method before landing", sub:"Camera-enforced parking everywhere. Charges apply within minutes of arrival.", url:"https://parka.is"},
    {text:"112 Iceland app", sub:"One button sends GPS to SAR. Mandatory for F-road days.", url:"https://www.112.is"},
    {text:"Gaia GPS — download Iceland offline maps", sub:"Essential for Lónsöræfi (Day 8) and Remundargil (Day 4). Download at home over wifi."},
    {text:"Wikiloc — save Remundargil + Lónsöræfi Hvítserkur routes offline"},
    {text:"Bookmark umferdin.is/en/road/91381 — F207 Laki live status", sub:"Check morning of Day 5 (Jul 4) before entering F206.", url:"https://umferdin.is/en/road/91381"},
    {text:"Bookmark safetravel.is", sub:"Register F88 (Day 11) and F206 (Day 5) before entering.", url:"https://safetravel.is"},
    {text:"Bookmark umferdin.is/en — general road conditions", url:"https://umferdin.is/en"},
    {text:"Bookmark en.vedur.is — Iceland weather 48hr forecast", url:"https://en.vedur.is"},
    {text:"Google Maps — download Iceland offline pack"},
  ]},
  {section:"Clothing + gear", badge:"gear", items:[
    {text:"Waterproof jacket (taped seams) × each", sub:"Keep in truck cab AT ALL TIMES. Weather changes in minutes."},
    {text:"Waterproof trousers × each", sub:"For rain + river crossing spray."},
    {text:"Merino wool base layer top × 3 each", sub:"Doesn't smell, dries fast. Critical for camping legs."},
    {text:"Merino wool base layer bottom × 2 each"},
    {text:"Warm mid-layer (fleece or down puffy) × each", sub:"Askja/Dreki highlands get near-freezing even in July."},
    {text:"Warm hat + gloves × each"},
    {text:"Hiking boots (stiff, ankle support, waterproof) × each", sub:"Break in for at least 2 weeks before departure."},
    {text:"Camp sandals × each", sub:"For campsite evenings and shower blocks."},
    {text:"Dry bags (5L, 10L, 20L) for truck bed", sub:"Everything in truck bed must be waterproofed."},
    {text:"Camp stove + fuel canisters", sub:"Buy gas in Iceland — cannot fly with pressurised canisters."},
    {text:"Cooking pot, pan, utensils, plates, mugs"},
    {text:"Power banks × 2 (20,000mAh+)", sub:"No power at Dreki or any F-road camp."},
    {text:"Sunscreen SPF 50+ × 2 tubes", sub:"Midnight sun UV is real. Glacier surfaces reflect intensely."},
    {text:"Polarised sunglasses × each"},
    {text:"Reusable water bottles × 2 each (1L minimum)", sub:"Iceland tap water is safe and free everywhere."},
    {text:"Quick-dry travel towel × each", sub:"For canyoning, Viti swim, campsite showers."},
    {text:"Personal medications + generous surplus"},
    {text:"Small padlock for hostel lockers"},
  ]},
  {section:"Vehicle check (on collection at KEF)", badge:"gear", items:[
    {text:"Confirm full-size spare tyre (not space-saver)", sub:"Critical on F-road lava. Insist on full-size or change rental."},
    {text:"Check tyre pressure on collection"},
    {text:"Confirm F-road insurance in writing — F88, F206, F207"},
    {text:"Duct tape (large roll) in truck"},
    {text:"Check windscreen washer fluid level"},
    {text:"Jump cables or compact battery jump starter"},
    {text:"Emergency bivvy bag × 2", sub:"If stuck in highlands overnight. Weighs 100g each."},
    {text:"Head torch × 2 + spare batteries"},
    {text:"Practice opening + closing the rooftop tent before leaving lot"},

  ]},
  {section:"Day-of reminders", badge:"urgent", items:[
    {text:"Day 2 (Jul 1): check F208 open at road.is before entering", sub:"Almost certainly open — but always verify."},
    {text:"Day 5 (Jul 4): check umferdin.is/en/road/91381 for F207 status", sub:"If CLOSED → drive direct to Skaftafell. Day 6 unaffected."},
    {text:"Day 7 (Jul 6): bring towel + dry clothes for canyoning", sub:"Ice Guardians provides wetsuit/helmet/harness. You bring a change of clothes."},
    {text:"Day 11 (Jul 10): fill fuel MAX + 20L jerry can at Mývatn before F88", sub:"Non-negotiable. Zero fuel on F88 route."},
    {text:"Day 11 (Jul 10): register F88 route at safetravel.is before entering"},
    {text:"Day 15 (Jul 14): leave Snæfellsnes glacier tip by 11:15am", sub:"Hard deadline. 4pm KEF departure."},
    {text:"Day 15 (Jul 14): fill fuel at Orkan before rental return", sub:"Return truck full. Fill before airport, not at airport prices."},
    {text:"Every F-road day: walk each river crossing before driving"},
  ]},
  {section:"Emergency contacts", badge:"info", items:[
    {text:"Icelandic emergency — 112", sub:"Or 112 Iceland app — sends GPS automatically."},
    {text:"Road conditions + SAR — 1777 (24hrs)", sub:"umferdin.is for live road info."},
    {text:"Your rental company emergency number", sub:"Save in phone AND write on paper."},
    {text:"Ice Guardians — +354 898 2277 · info@ice-guardians.com", sub:"Day 7 canyoning operator."},
    {text:"Arctic Adventures — adventures.is", sub:"Day 6 Glacier Xtreme operator."},
    {text:"Travel insurance 24hr helpline", sub:"Save number in phone AND on paper."},
    {text:"KEF Airport — +354 425 6000", sub:"kefairport.is for live departures."},
  ]},
];

const BADGE_MAP = {urgent:'b-urgent',soon:'b-soon',before:'b-before',gear:'b-gear',info:'b-info'};
const BADGE_LABEL = {urgent:'🔴 Do today',soon:'🟡 1–2 weeks',before:'🔵 Before departure',gear:'🟣 Gear',info:'📋 Reference'};

let state = {};

function save(){ try{ localStorage.setItem('iceland-cl-26', JSON.stringify(state)); }catch(e){} }
function load(){ try{ const s=localStorage.getItem('iceland-cl-26'); if(s) state=JSON.parse(s); }catch(e){} }

function totalCounts(){
  let total=0, done=0;
  DATA.forEach((sec,si)=>{ sec.items.forEach((_,ii)=>{ total++; if(state[si+'-'+ii]) done++; }); });
  return {total,done};
}

function updateMaster(){
  const {total,done}=totalCounts();
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('mpct').textContent=pct+'%';
  document.getElementById('mbar').style.width=pct+'%';
  document.getElementById('msub').textContent=done+' of '+total+' items complete';
}

function updateSection(si){
  const sec=DATA[si];
  const total=sec.items.length;
  const done=sec.items.filter((_,ii)=>state[si+'-'+ii]).length;
  const pct=Math.round((done/total)*100);
  const bar=document.getElementById('pb-'+si);
  const lbl=document.getElementById('pl-'+si);
  if(bar) bar.style.width=pct+'%';
  if(lbl) lbl.textContent=done+'/'+total;
}

function toggle(si,ii){
  const key=si+'-'+ii;
  state[key]=!state[key];
  save();
  const el=document.getElementById('item-'+key);
  if(el) el.classList.toggle('done', state[key]);
  updateSection(si);
  updateMaster();
}

function render(){
  const root=document.getElementById('root');
  let html='';
  DATA.forEach((sec,si)=>{
    const bc=BADGE_MAP[sec.badge]||'b-before';
    const bl=BADGE_LABEL[sec.badge]||sec.badge;
    const total=sec.items.length;
    const done=sec.items.filter((_,ii)=>state[si+'-'+ii]).length;
    const pct=Math.round((done/total)*100);
    let items='';
    sec.items.forEach((item,ii)=>{
      const key=si+'-'+ii;
      const isDone=state[key]||false;
      const link=item.url?`<a class="item-link" href="${item.url}" target="_blank" onclick="event.stopPropagation()">${new URL(item.url).hostname} ↗</a>`:'';
      items+=`<div class="item${isDone?' done':''}" id="item-${key}" onclick="toggle(${si},${ii})">
        <div class="checkbox"></div>
        <div class="item-info">
          <div class="item-text">${item.text}</div>
          ${item.sub?`<div class="item-sub">${item.sub}</div>`:''}
          ${link}
        </div>
      </div>`;
    });
    html+=`<div class="section">
      <div class="sec-head">
        <div class="sec-title">${sec.section}</div>
        <span class="badge ${bc}">${bl}</span>
      </div>
      <div class="items">${items}</div>
      <div class="sec-prog">
        <div class="sec-prog-top"><span id="pl-${si}">${done}/${total}</span><span>${pct}%</span></div>
        <div class="prog-wrap"><div class="prog-bar" id="pb-${si}" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  });
  root.innerHTML=html;
  updateMaster();
}

load();
render();
</script>
</body>
</html>
